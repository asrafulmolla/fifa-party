{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="page-wrapper">
<div class="container" style="max-width:480px;">

  <div style="text-align:center;padding:60px 0 40px;">
    <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--navy),var(--red));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" width="32" height="32"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
    </div>
    <h1 style="font-size:2rem;margin-bottom:6px;">Welcome Back</h1>
    <p style="color:var(--text-secondary);">Sign in to your FIFA Party account</p>
  </div>

  <div class="card">
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post" id="login-form">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Your username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" id="login-submit-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);font-size:0.88rem;color:var(--text-muted);">
      New to FIFA Party? <a href="/register/" style="color:var(--navy-light);font-weight:600;">Create Free Account</a>
    </div>
  </div>
  <div style="padding-bottom:60px;"></div>
</div>
</div>
{% endblock %}
